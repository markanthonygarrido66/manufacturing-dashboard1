<!DOCTYPE html>
<html>
<head>
    <title>Manufacturing Control System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* TOP BAR */
        .topbar {
            background: #111827;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LAYOUT */
        .container {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #111827;
            min-height: 100vh;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f2937;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
        }

        /* CARDS */
        .card {
            background: #1f2937;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            gap: 15px;
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        button {
            padding: 8px 12px;
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        select, input {
            padding: 8px;
            margin-right: 5px;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>🏭 Manufacturing Control System</h2>

    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button style="background:red;">Logout</button>
    </form>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="{% url 'dashboard' %}">📊 Dashboard</a>
        <a href="{% url 'production_home' %}">📦 Production</a>
        <a href="{% url 'materials_home' %}">🧾 Materials</a>
        <a href="{% url 'sensor_dashboard' %}">📡 Sensors</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
