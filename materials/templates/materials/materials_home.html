{% extends 'base.html' %}

{% block content %}

<style>

.header{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    padding:30px;
    border-radius:16px;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h3{
    color:#64748b;
}

.card h2{
    font-size:28px;
}

.panel{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #e2e8f0;
}

.low{
    background:#ef4444;
    color:white;
    padding:5px 10px;
    border-radius:20px;
}

.ok{
    background:#22c55e;
    color:white;
}

</style>

<div class="header">
    <h1>📦 Materials Management</h1>
    <p>Inventory and supply chain monitoring system</p>
</div>

<div class="grid">

    <div class="card">
        <h3>Total Materials</h3>
        <h2>1,250</h2>
    </div>

    <div class="card">
        <h3>Low Stock Items</h3>
        <h2>12</h2>
    </div>

    <div class="card">
        <h3>Active Suppliers</h3>
        <h2>8</h2>
    </div>

</div>

<div class="panel">

    <h2>📋 Inventory Status</h2>

    <table>

        <thead>
            <tr>
                <th>Material</th>
                <th>Stock</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>Steel</td>
                <td>120</td>
                <td><span class="ok">OK</span></td>
            </tr>

            <tr>
                <td>Aluminum</td>
                <td>20</td>
                <td><span class="low">LOW</span></td>
            </tr>

        </tbody>

    </table>

</div>

{% endblock %}
