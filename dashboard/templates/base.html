<!DOCTYPE html>
<html>
<head>
    <title>Manufacturing Control System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* TOP BAR */
        .topbar {
            background: #111827;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LAYOUT */
        .container {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #111827;
            min-height: 100vh;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f2937;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
        }

        /* CARDS */
        .card {
            background: #1f2937;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            gap: 15px;
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        button {
            padding: 8px 12px;
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        select, input {
            padding: 8px;
            margin-right: 5px;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>🏭 Manufacturing Control System</h2>

    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button style="background:red;">Logout</button>
    </form>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="card">
    <h4>Live Production</h4>

    Output:
    <span id="sidebar_output">0</span>

    <br>

    Yield:
    <span id="sidebar_yield">0</span>

    <br>

    Defects:
    <span id="sidebar_defects">0</span>
</div>

        <a href="{% url 'dashboard' %}">📊 Dashboard</a>
        <a href="{% url 'production_home' %}">📦 Production</a>
        <a href="{% url 'materials_home' %}">🧾 Materials</a>
        <a href="{% url 'sensor_dashboard' %}">📡 Sensors</a>
   {% if request.user.userprofile.role == 'worker' %}
    <a href="{% url 'production_input_page' %}">
        📥 Factory Input
    </a>
{% endif %}
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        {% block content %}{% endblock %}
    </div>

</div>

<script>

function updateSidebar(){

    let data =
        localStorage.getItem(
            "production_update"
        );

    if(!data) return;

    data = JSON.parse(data);

    document.getElementById(
        "sidebar_output"
    ).innerText = data.output;

    document.getElementById(
        "sidebar_yield"
    ).innerText = data.yield;

    document.getElementById(
        "sidebar_defects"
    ).innerText = data.defects;
}

updateSidebar();

window.addEventListener(
    "production_update",
    updateSidebar
);

</script>

</body>
</html>
