<!DOCTYPE html>
<html>
<head>
    <title>Manufacturing Command Center</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b1220;
            color: #e5e7eb;
        }

        /* TOPBAR */
        .topbar {
            height: 60px;
            background: #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #1f2937;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #0f172a;
            height: 100vh;
            position: fixed;
            padding: 20px;
            border-right: 1px solid #1f2937;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .sidebar a:hover {
            background: #1e293b;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 20px;
        }

        /* GRID SYSTEM */
        .grid {
            display: grid;
            gap: 15px;
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        /* CARDS */
        .card {
            background: #111827;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #1f2937;
        }

        .card h3 {
            margin: 0;
            font-size: 14px;
            color: #94a3b8;
        }

        .card h2 {
            margin-top: 10px;
            font-size: 26px;
        }

        /* BUTTON */
        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #1f2937;
        }

        th {
            background: #111827;
            text-align: left;
        }

    </style>
</head>

<body>

<div class="topbar">
    <h3>🏭 Manufacturing Command Center</h3>

    <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
</div>

<div class="sidebar">
    <a href="/dashboard/">📊 Dashboard</a>
    <a href="#">📦 Production</a>
    <a href="#">🧾 Materials</a>
    <a href="#">📡 Sensors</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
