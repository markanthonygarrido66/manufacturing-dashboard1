{% extends 'base.html' %}

{% block content %}

<div class="dashboard-header">
    <h2>🏭 Manufacturing Dashboard</h2>
    <p>Overall Manufacturing Operations Overview</p>
</div>

<div class="sensor-grid">

    <div class="sensor-card">
        <div class="sensor-icon">📦</div>
        <div class="sensor-title">Materials</div>
        <div class="sensor-value">250</div>
        <div class="sensor-unit">Available</div>
    </div>

    <div class="sensor-card">
        <div class="sensor-icon">⚙️</div>
        <div class="sensor-title">Production</div>
        <div class="sensor-value">125</div>
        <div class="sensor-unit">Units Today</div>
    </div>

    <div class="sensor-card">
        <div class="sensor-icon">📡</div>
        <div class="sensor-title">Sensors</div>
        <div class="sensor-value">3</div>
        <div class="sensor-unit">Active</div>
    </div>

</div>

<div class="panel">
    <h3 class="panel-title">📊 System Overview</h3>

    <table>
        <tr>
            <th>Module</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>Materials</td>
            <td><span class="status-online">ONLINE</span></td>
        </tr>

        <tr>
            <td>Production</td>
            <td><span class="status-online">ONLINE</span></td>
        </tr>

        <tr>
            <td>Sensors</td>
            <td><span class="status-online">ONLINE</span></td>
        </tr>
    </table>
</div>

{% endblock %}
