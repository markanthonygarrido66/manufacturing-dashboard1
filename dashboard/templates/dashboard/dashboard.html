{% extends 'dashboard/base.html' %}

{% block content %}

<div class="filters">
    <form method="GET">
        {% csrf_token %}
        <input type="date" name="date">

        <select name="line">
            <option value="">All Production Lines</option>
            <option value="L1">Line 1</option>
            <option value="L2">Line 2</option>
        </select>

        <button type="submit">Filter</button>
    </form>
</div>

<div class="cards">

    <div class="card">
        <h3>Total Yield</h3>
        <p>{{ total_yield }}</p>
    </div>

    <div class="card">
        <h3>Production Count</h3>
        <p>{{ production_count }}</p>
    </div>

    <div class="card">
        <h3>Materials Used</h3>
        <p>{{ materials_used }}</p>
    </div>

    <div class="card">
        <h3>Efficiency</h3>
        <p>{{ efficiency }}%</p>
    </div>

</div>

{% endblock %}
