{% extends 'base.html' %}

{% block content %}

<style>

.banner{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    padding:30px;
    border-radius:16px;
    margin-bottom:25px;
}

.kpi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.kpi{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:.3s;
}

.kpi:hover{
    transform:translateY(-5px);
}

.kpi h3{
    color:#64748b;
    font-size:14px;
}

.kpi h2{
    font-size:28px;
    color:#0f172a;
}

.panel{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:center;
}

.status{
    background:#22c55e;
    color:white;
    padding:5px 10px;
    border-radius:20px;
}

.warning{
    background:#f59e0b;
    color:white;
}

</style>

<div class="banner">
    <h1>🏭 Production Control Center</h1>
    <p>Real-time manufacturing process monitoring</p>
</div>

<div class="kpi-grid">

    <div class="kpi">
        <h3>Total Output</h3>
        <h2>8,450 Units</h2>
    </div>

    <div class="kpi">
        <h3>Efficiency</h3>
        <h2>95.6%</h2>
    </div>

    <div class="kpi">
        <h3>Active Lines</h3>
        <h2>6</h2>
    </div>

</div>

<div class="panel">

    <h2>📋 Production Report</h2>

    <table>
        <thead>
            <tr>
                <th>Line</th>
                <th>Output</th>
                <th>Efficiency</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Line A</td>
                <td>2,500</td>
                <td>97%</td>
                <td><span class="status">GOOD</span></td>
            </tr>

            <tr>
                <td>Line B</td>
                <td>2,100</td>
                <td>93%</td>
                <td><span class="warning">CHECK</span></td>
            </tr>

        </tbody>
    </table>

</div>

{% endblock %}
