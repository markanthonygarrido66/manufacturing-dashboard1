{% extends 'base.html' %}

{% block content %}

<div class="dashboard-header">
    <h2>⚙️ Production Dashboard</h2>
    <p>Monitor Production Performance</p>
</div>

<div class="sensor-grid">

    <div class="sensor-card">
        <div class="sensor-icon">🏭</div>
        <div class="sensor-title">Today's Output</div>
        <div class="sensor-value">125</div>
        <div class="sensor-unit">Units</div>
    </div>

    <div class="sensor-card">
        <div class="sensor-icon">👨‍🏭</div>
        <div class="sensor-title">Workers</div>
        <div class="sensor-value">18</div>
        <div class="sensor-unit">Active</div>
    </div>

    <div class="sensor-card">
        <div class="sensor-icon">📈</div>
        <div class="sensor-title">Efficiency</div>
        <div class="sensor-value">95%</div>
    </div>

</div>

<div class="panel">
    <h3 class="panel-title">📋 Production Status</h3>

    <table>
        <tr>
            <th>Line</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>Production Line A</td>
            <td><span class="status-online">RUNNING</span></td>
        </tr>

        <tr>
            <td>Production Line B</td>
            <td><span class="status-online">RUNNING</span></td>
        </tr>
    </table>
</div>

{% endblock %}
