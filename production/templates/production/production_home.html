{% extends 'base.html' %}
{% block content %}

<style>
body {
    background: #0b1220;
}

.header {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 25px;
    border-radius: 16px;
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
}

.card {
    background: #111827;
    border: 1px solid #1f2937;
    padding: 20px;
    border-radius: 16px;
    color: white;
}

.value {
    font-size: 28px;
    font-weight: bold;
    color: #38bdf8;
}

.label {
    color: #94a3b8;
    font-size: 14px;
}

.status {
    margin-top: 10px;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 20px;
    display: inline-block;
    background: #22c55e;
    color: white;
}

.panel {
    margin-top: 20px;
    background: #0f172a;
    padding: 20px;
    border-radius: 16px;
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
    color: white;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #1f2937;
}
</style>

<!-- HEADER -->
<div class="header">
    <h2>🏭 Production Control Room</h2>
    <small>Real-time production monitoring</small>
</div>

<!-- CARDS -->
<div class="grid">

    <div class="card">
        <div class="label">Total Output</div>
        <div class="value" id="total_output">0</div>
        <div class="status">ACTIVE</div>
    </div>

    <div class="card">
        <div class="label">Daily Production</div>
        <div class="value" id="daily_production">0</div>
        <div class="status">RUNNING</div>
    </div>

    <div class="card">
        <div class="label">Efficiency</div>
        <div class="value" id="efficiency">0%</div>
        <div class="status">OPTIMAL</div>
    </div>

    <div class="card">
        <div class="label">Machine Status</div>
        <div class="value">LIVE</div>
        <div class="status">ALL SYSTEMS</div>
    </div>

</div>

<!-- TABLE -->
<div class="panel">
    <h3>📋 Production Records</h3>

    <table>
        <thead>
            <tr>
                <th>Line</th>
                <th>Output</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="production-body"></tbody>

    </table>
</div>

<!-- JAVASCRIPT (FIXED) -->
<script>
function updateProduction() {

    console.log("Updating production...");

    fetch("/production/live/?t=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {

        console.log("DATA RECEIVED:", data);

        // Update cards
        document.getElementById("total_output").innerText = data.total_output;
        document.getElementById("daily_production").innerText = data.daily_production;
        document.getElementById("efficiency").innerText = data.efficiency + "%";

        // Update table
        let rows = "";

        data.records.forEach(item => {
            rows += `
                <tr>
                    <td>${item.line}</td>
                    <td>${item.output}</td>
                    <td>${item.date}</td>
                </tr>
            `;
        });

        document.getElementById("production-body").innerHTML = rows;
    })
    .catch(error => {
        console.error("Fetch error:", error);
    });
}

// IMPORTANT: make sure it runs globally
window.updateProduction = updateProduction;

// initial load
updateProduction();

// auto refresh every 5 seconds
setInterval(updateProduction, 5000);

let socket = new WebSocket("wss://" + window.location.host + "/ws/live/");

socket.onmessage = function(event) {
    console.log("LIVE UPDATE RECEIVED");

    updateProduction();
    updateDashboard();
    updateMaterials();
    updateSensors();
};
</script>

{% endblock %}
